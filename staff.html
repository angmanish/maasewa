<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Dashboard - Maaseva Healthcare</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    .staff-card { background: rgba(15, 40, 71, 0.6); border: 1px solid rgba(232, 244, 248, 0.1); border-radius: 20px; padding: 1.5rem; backdrop-filter: blur(10px); }
    
    /* Attendance Calendar Styles */
    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
    }

    .calendar-day {
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        font-weight: 500;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.2s ease;
        cursor: default;
    }

    .calendar-day.status-present {
        background: rgba(0, 212, 170, 0.15);
        border-color: rgba(0, 212, 170, 0.3);
        color: #00d4aa;
        font-weight: 700;
    }

    .calendar-day.status-halfday {
        background: rgba(249, 115, 22, 0.15);
        border-color: rgba(249, 115, 22, 0.3);
        color: #f97316;
        font-weight: 700;
    }

    .calendar-day.status-absent {
        background: rgba(239, 68, 68, 0.05);
        border-color: rgba(239, 68, 68, 0.15);
        color: rgba(239, 68, 68, 0.4);
    }

    .calendar-day.is-today {
        border: 2px solid #00d4aa !important;
    }

    .calendar-day.is-future {
        opacity: 0.2;
    }
    
    .calendar-day.empty {
        background: transparent;
        border: none;
    }
  </style>
 </head>
 <body class="h-full">
  <div class="app-wrapper">
   <div class="gradient-bg">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
   </div>
   
   <nav class="nav-container scrolled">
    <div class="nav-inner">
     <a href="index.html" class="logo">
      <div class="logo-icon"><img src="logo2.png" alt="M"></div>
      <span class="logo-text">Staff Portal</span>
     </a>
     <button id="logoutBtn" class="nav-cta">Logout</button>
    </div>
   </nav>

   <section class="pt-32 px-6 pb-20 relative z-10 max-w-7xl mx-auto">
    <h1 class="section-title">Staff Dashboard</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
     <!-- My Attendance View -->
     <div class="staff-card">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold">Attendance Calendar</h2>
        <div class="flex items-center gap-4">
          <button id="prevMonth" class="text-gray-400 hover:text-[#00d4aa]"><i class="fas fa-chevron-left"></i></button>
          <span class="text-sm font-semibold min-w-[120px] text-center" id="currentMonthYear"></span>
          <button id="nextMonth" class="text-gray-400 hover:text-[#00d4aa]"><i class="fas fa-chevron-right"></i></button>
        </div>
      </div>
      
      <div class="calendar-container">
        <div class="grid grid-cols-7 gap-1 mb-2 text-center text-xs font-bold text-gray-500">
          <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
        </div>
        <div class="grid grid-cols-7 gap-1" id="calendarGrid">
          <!-- Calendar days will be generated here -->
        </div>
      </div>

      <div class="mt-6 flex flex-wrap gap-4 text-xs justify-center">
        <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-[#00d4aa]"></span> Present</div>
        <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-orange-500"></span> Half-Day</div>
        <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-red-500/30 border border-red-500/50"></span> Absent</div>
      </div>
     </div>
     
     <!-- My Assigned Work -->
     <div class="staff-card overflow-y-auto max-h-[500px]">
      <h2 class="text-xl font-bold mb-6">Assigned Work</h2>
      <div class="space-y-4" id="assignedWorkList">
       <div class="text-gray-500 text-sm">Loading work...</div>
      </div>
     </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
     <!-- Quick Stats -->
     <div class="staff-card text-center flex flex-col justify-center">
      <h2 class="text-xl font-bold mb-6">Quick Stats</h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <div class="text-3xl font-bold text-[#00d4aa]" id="myCompletedWorks">0</div>
          <div class="text-gray-400 text-xs">Works Done</div>
        </div>
        <div>
          <div class="text-3xl font-bold text-[#00d4aa]" id="myAttendanceCount">0</div>
          <div class="text-gray-400 text-xs">Days Present</div>
        </div>
      </div>
     </div>

     <!-- My Completed Work history -->
     <div class="staff-card">
      <h2 class="text-xl font-bold mb-6">Completed History</h2>
      <div class="space-y-4" id="workHistoryList">
       <div class="text-gray-500 text-sm">Loading history...</div>
      </div>
     </div>
    </div>
   </section>
  </div>

  <!-- Work Completion Modal -->
  <div id="workModal" class="fixed inset-0 bg-black/80 z-[2000] hidden items-center justify-center p-6">
    <div class="staff-card w-full max-w-md">
      <h3 class="text-xl font-bold mb-4">Complete Work</h3>
      <form id="completeWorkForm" class="space-y-4">
        <input type="hidden" id="workId">
        <div>
          <label class="form-label">Completion Details</label>
          <textarea id="completionNote" class="form-input" placeholder="Enter notes about completed work..." required></textarea>
        </div>
        <div>
          <label class="form-label">Reason for change (if any)</label>
          <input type="text" id="changeReason" class="form-input" placeholder="Enter reason if details were changed">
        </div>
        <div class="flex gap-4 pt-4">
          <button type="button" class="btn-secondary flex-1" onclick="closeWorkModal()">Cancel</button>
          <button type="submit" class="btn-primary flex-1">Mark Completed</button>
        </div>
        <div id="completeWorkMsg" class="mt-4 text-center text-sm hidden"></div>
      </form>
    </div>
  </div>

  <script type="module" src="dashboard.js"></script>
 </body>
</html>
